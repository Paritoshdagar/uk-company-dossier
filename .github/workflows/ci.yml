name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run docs:links
      - run: npm run docs:mermaid
      - run: npm run verify:push

  security:
    runs-on: ubuntu-latest
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # actions/setup-node v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: go run github.com/zricethezav/gitleaks/v8@v8.30.0 detect --source . --no-git --redact --verbose
      - run: go run github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8 scan source --lockfile package-lock.json
